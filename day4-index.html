<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="html forms validation and submission">
    <title>Forms</title>
</head>

<body>
    <h2>HTML Forms with Input Types</h2>

    <form action="success.html">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fname">Enter your name</label>
            <input type="text" id="fname" placeholder="John" required><br><br>

            <label for="email">Enter your email</label>
            <input type="email" id="email" placeholder="example@mail.com" required><br><br>

            <label for="pass">Enter your Password</label>
            <input type="password" id="pass" required><br><br>

            <label for="mobile">Mobile number</label>
            <input type="number" id="mobile" required><br><br>

            <label for="dob">Select Date</label>
            <input type="date" id="dob" required><br><br>

            <label for="time">Select time</label>
            <input type="time" id="time" required><br><br>

            <label for="range">Your Cloud Space</label>
            <input type="range" id="range" min="0" max="10"><br><br>

            <label>Gender:</label>
            <input name="gender" type="radio" id="male" required> <label for="male">Male</label>
            <input name="gender" type="radio" id="female"> <label for="female">Female</label>
            <input name="gender" type="radio" id="others"> <label for="others">Others</label><br><br>

            <label for="file">Select your Profile Picture</label>
            <input type="file" id="file" required><br><br>

            <label for="country">Select your country</label>
            <select name="country" id="country" required>
                <option value="">Select country</option>
                <option value="india">India</option>
                <option value="argentina">Argentina</option>
                <option value="srilanka">Sri lanka</option>
            </select><br><br>

            <label for="address">Enter your Full Address</label><br>
            <textarea rows="5" name="address" id="address" required></textarea><br><br>

            <input type="checkbox" id="terms" required>
            <label for="terms">Accept Terms & Conditions</label><br><br>

            <button type="submit">Submit your data</button>
            <button type="reset">Reset</button>
        </fieldset>
    </form>
</body>

</html>
